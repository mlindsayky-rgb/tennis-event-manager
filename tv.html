<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tennis Event — Scoreboard</title>
  <style>
    /* ── RESET ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /* ── FONTS ── */
    @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800;900&family=Inter:wght@400;600;700;800;900&display=swap');

    /* ── BASE ── */
    :root {
      --bg: #0B1220;
      --surface: #131D2E;
      --surface2: #1A2640;
      --border: rgba(255,255,255,.08);
      --text: #FFFFFF;
      --text-dim: rgba(255,255,255,.6);
      --text-ghost: rgba(255,255,255,.25);
      --accent: #22C55E;
      --font-display: 'Playfair Display', Georgia, serif;
      --font-body: 'Inter', sans-serif;
    }

    html, body {
      width: 100%; height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-body);
      overflow: hidden;
    }

    /* ── LAYOUT ── */
    #app {
      display: flex;
      flex-direction: column;
      height: 100vh;
      padding: 0;
    }

    /* ── HEADER ── */
    #header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px 40px 16px;
      background: linear-gradient(135deg, #0F1F3D 0%, #0B1220 100%);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    #event-name {
      font-family: var(--font-display);
      font-size: clamp(28px, 3.5vw, 52px);
      letter-spacing: .5px;
      color: white;
    }

    #round-label {
      font-size: clamp(12px, 1.2vw, 18px);
      color: var(--text-dim);
      margin-top: 2px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    #clock {
      font-family: var(--font-display);
      font-size: clamp(24px, 2.5vw, 40px);
      color: var(--text-dim);
      letter-spacing: 1px;
    }

    /* ── TEAM SCORE BAR ── */
    #score-bar {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      flex-shrink: 0;
    }

    .team-score-block {
      padding: 20px 40px;
      text-align: center;
      position: relative;
    }

    .team-score-block.team-a { text-align: right; }
    .team-score-block.team-b { text-align: left; }

    .team-name {
      font-family: var(--font-display);
      font-size: clamp(20px, 2.8vw, 44px);
      letter-spacing: .5px;
      line-height: 1;
    }

    .team-total-score {
      font-family: var(--font-display);
      font-size: clamp(48px, 7vw, 110px);
      line-height: 1;
      margin-top: 4px;
      font-style: italic;
    }

    .team-score-label {
      font-size: clamp(10px, 1vw, 14px);
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: var(--text-ghost);
      margin-top: 2px;
    }

    .score-divider {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0 30px;
      font-family: var(--font-display);
      font-size: clamp(40px, 6vw, 90px);
      color: var(--text-ghost);
    }

    /* ── COURTS ── */
    #courts-container {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      padding: 0;
    }

    .court-grid {
      display: grid;
      grid-template-columns: 1fr 180px 1fr;
      border-bottom: 1px solid var(--border);
      flex: 1;
      min-height: 0;
      transition: background .4s;
    }

    .court-grid:last-child { border-bottom: none; }
    .court-grid:nth-child(even) { background: var(--surface); }
    .court-grid:nth-child(odd) { background: var(--bg); }

    .court-team {
      display: flex;
      align-items: center;
      padding: 0 32px;
      gap: 16px;
    }

    .court-team.team-a {
      justify-content: flex-end;
      text-align: right;
    }

    .court-team.team-b {
      justify-content: flex-start;
      text-align: left;
    }

    .court-players {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .player-name {
      font-size: clamp(14px, 1.8vw, 26px); /* overridden by JS per court count */
      font-weight: 700;
      color: white;
      line-height: 1.2;
      white-space: nowrap;
      transition: font-size .3s;
    }

    .player-name.dim { color: var(--text-dim); font-weight: 500; }

    .court-score {
      font-family: var(--font-display);
      font-size: clamp(28px, 4.5vw, 70px); /* overridden by JS per court count */
      line-height: 1;
      min-width: 40px;
      flex-shrink: 0;
      font-style: italic;
      transition: font-size .3s;
    }

    .court-score.winner { color: white; }
    .court-score.loser { color: var(--text-dim); }
    .court-score.playing { color: var(--text-ghost); font-size: clamp(12px, 1.2vw, 18px); font-family: var(--font-body); font-weight: 600; text-transform: uppercase; letter-spacing: 1px; align-self: center; }

    .court-center {
      display: flex;
      align-items: center;
      justify-content: center;
      border-left: 1px solid var(--border);
      border-right: 1px solid var(--border);
      padding: 0 12px;
      overflow: visible;
    }

    .court-label {
      font-family: var(--font-display);
      font-size: clamp(12px, 1.5vw, 20px);
      color: var(--text-ghost);
      letter-spacing: 1px;
      writing-mode: vertical-rl;
      text-orientation: mixed;
      transform: rotate(180deg);
    }

    /* ── SITTING OUT ── */
    #sitout-bar {
      padding: 10px 40px;
      background: var(--surface2);
      border-top: 1px solid var(--border);
      font-size: clamp(11px, 1vw, 15px);
      color: var(--text-ghost);
      flex-shrink: 0;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    #sitout-bar span { color: var(--text-dim); font-weight: 600; }

    /* ── FOOTER ── */
    #footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 40px;
      background: var(--bg);
      border-top: 1px solid var(--border);
      flex-shrink: 0;
    }

    #club-name {
      font-size: clamp(11px, 1vw, 14px);
      color: var(--text-ghost);
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    #refresh-indicator {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: clamp(10px, .9vw, 13px);
      color: var(--text-ghost);
    }

    #refresh-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--accent);
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: .3; }
    }

    /* ── LOADING / EMPTY ── */
    #loading {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 20px;
    }

    .spinner {
      width: 48px; height: 48px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .empty-msg {
      font-family: var(--font-display);
      font-size: clamp(24px, 3vw, 48px);
      color: var(--text-ghost);
      letter-spacing: 1px;
    }

    /* ── EVENT PICKER (shown when no active event) ── */
    #event-picker {
      display: none;
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,.85);
      z-index: 100;
      align-items: center;
      justify-content: center;
    }

    #event-picker.show { display: flex; }

    .picker-box {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 32px;
      max-width: 480px;
      width: 90%;
    }

    .picker-title {
      font-family: var(--font-display);
      font-size: 32px;
      margin-bottom: 20px;
      color: white;
    }

    .picker-event {
      padding: 14px 18px;
      border: 1px solid var(--border);
      border-radius: 10px;
      margin-bottom: 10px;
      cursor: pointer;
      transition: all .15s;
      font-size: 15px;
      font-weight: 600;
    }

    .picker-event:hover { background: var(--surface2); border-color: rgba(255,255,255,.2); }
    .picker-event .ev-status { font-size: 11px; color: var(--text-ghost); font-weight: 400; margin-top: 3px; }
  </style>
</head>
<body>

<div id="app">
  <!-- Header -->
  <div id="header">
    <div>
      <div id="event-name">Tennis Event Manager</div>
      <div id="round-label">Loading…</div>
    </div>
    <div id="clock">--:--</div>
  </div>

  <!-- Score bar -->
  <div id="score-bar">
    <div class="team-score-block team-a" id="team-a-block">
      <div class="team-name" id="team-a-name">Team A</div>
      <div class="team-total-score" id="team-a-score">0</div>
      <div class="team-score-label">total games won</div>
    </div>
    <div class="score-divider">·</div>
    <div class="team-score-block team-b" id="team-b-block">
      <div class="team-name" id="team-b-name">Team B</div>
      <div class="team-total-score" id="team-b-score">0</div>
      <div class="team-score-label">total games won</div>
    </div>
  </div>

  <!-- Courts -->
  <div id="courts-container">
    <div id="loading">
      <div class="spinner"></div>
      <div class="empty-msg">Connecting…</div>
    </div>
  </div>

  <!-- Sitting out -->
  <div id="sitout-bar" style="display:none">
    <span>Sitting out:</span> <span id="sitout-names"></span>
  </div>

  <!-- Footer -->
  <div id="footer">
    <div id="club-name">Tennis Event Manager</div>
    <div id="refresh-indicator" onclick="loadScoreboard()" style="cursor:pointer" title="Tap to refresh now">
      <div id="refresh-dot"></div>
      <span id="refresh-text">Live · tap to refresh</span>
    </div>
  </div>
</div>

<!-- Event picker overlay -->
<div id="event-picker">
  <div class="picker-box">
    <div class="picker-title">Select Event</div>
    <div id="picker-events"></div>
  </div>
</div>

<script type="module">
  // ── SUPABASE ─────────────────────────────────────────
  const SUPABASE_URL = 'https://vrnvhrruvzcnslvceacn.supabase.co';
  const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZybnZocnJ1dnpjbnNsdmNlYWNuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE2MDUwMjgsImV4cCI6MjA5NzE4MTAyOH0.Q7nH6aYILrUewrnmoi5AHK8XNrMoNEeAILIgRxeEaAQ';

  const { createClient } = await import('https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm');
  const sb = createClient(SUPABASE_URL, SUPABASE_KEY);

  // ── STATE ─────────────────────────────────────────────
  let activeEventId = null;
  let refreshTimer = null;
  const REFRESH_INTERVAL = 15000; // 15 seconds

  // ── CLOCK ─────────────────────────────────────────────
  function updateClock() {
    const now = new Date();
    let h = now.getHours();
    const m = now.getMinutes().toString().padStart(2,'0');
    const ampm = h >= 12 ? 'PM' : 'AM';
    h = h % 12 || 12;
    document.getElementById('clock').textContent = `${h}:${m} ${ampm}`;
  }
  updateClock();
  setInterval(updateClock, 10000);

  // ── INIT ─────────────────────────────────────────────
  async function init() {
    // Check URL param for event ID
    const params = new URLSearchParams(window.location.search);
    const eid = params.get('event');

    if(eid) {
      activeEventId = eid;
      startRefresh();
    } else {
      await showEventPicker();
    }
  }

  // ── EVENT PICKER ─────────────────────────────────────
  async function showEventPicker() {
    const { data: events } = await sb.from('events')
      .select('id,name,status,event_date')
      .in('status',['LIVE','TEAMS_SET'])
      .eq('is_archived', false)
      .order('event_date', { ascending: false })
      .limit(10);

    console.log('Live events found:', events?.map(e=>e.name+' ('+e.id+')'));

    if(events?.length === 1) {
      // Only one live event — auto-select
      console.log('Auto-selecting:', events[0].name, events[0].id);
      activeEventId = events[0].id;
      startRefresh();
      return;
    }

    if(!events?.length) {
      document.getElementById('loading').innerHTML =
        '<div class="empty-msg">No live events found</div>' +
        '<div style="color:var(--text-ghost);font-size:14px;margin-top:8px">Start an event in the app first</div>';
      return;
    }

    const picker = document.getElementById('event-picker');
    const list = document.getElementById('picker-events');
    list.innerHTML = events.map(e => `
      <div class="picker-event" onclick="selectEvent('${e.id}')">
        ${e.name}
        <div class="ev-status">${e.status} · ${e.event_date||''}</div>
      </div>
    `).join('');
    picker.classList.add('show');
    window.selectEvent = (id) => {
      activeEventId = id;
      console.log('Director selected event:', id);
      picker.classList.remove('show');
      startRefresh();
    };
  }

  // ── REFRESH LOOP ─────────────────────────────────────
  function startRefresh() {
    loadScoreboard();
    clearInterval(refreshTimer);
    refreshTimer = setInterval(loadScoreboard, REFRESH_INTERVAL);
  }

  // ── LOAD SCOREBOARD ───────────────────────────────────
  async function loadScoreboard() {
    if(!activeEventId) return;

    // Flash refresh indicator
    const dot = document.getElementById('refresh-dot');
    dot.style.background = '#fff';
    setTimeout(() => dot.style.background = '#22C55E', 500);

    // Fetch event
    const { data: event } = await sb.from('events')
      .select('name,status,num_courts')
      .eq('id', activeEventId).single();
    if(!event) return;

    document.getElementById('event-name').textContent = event.name;
    document.getElementById('club-name').textContent = event.name;

    // Fetch teams
    const { data: teams } = await sb.from('teams')
      .select('id,name,color').eq('event_id', activeEventId);
    if(!teams?.length) {
      showEmpty('Teams not yet set');
      return;
    }

    // Fetch rounds ordered by round_number desc
    const { data: rounds } = await sb.from('rounds')
      .select('*')
      .eq('event_id', activeEventId)
      .order('round_number', { ascending: false });

    console.log('All rounds:', rounds?.map(r=>'R'+r.round_number+' id:'+r.id+' complete:'+r.is_complete));

    // Pick highest round number that is not complete
    // Show the most recently SCORED round — if Round 2 has scores but Round 3 doesn't,
    // show Round 2 (active play) not Round 3 (just deployed, no scores yet)
    // Once Round 3 gets its first score, it takes over
    const roundsDesc = (rounds||[]).sort((a,b)=>b.round_number-a.round_number);
    const activeRound = roundsDesc[0]; // start with latest
    console.log('Active round:', activeRound?.round_number, 'id:', activeRound?.id);
    if(!activeRound) {
      showEmpty('No rounds deployed yet');
      return;
    }

    const fmtLabel = {
      BG:'Mixed Doubles',BB:'Boys Doubles',GG:'Girls Doubles',
      TD:'Top Down',MIX:'Mixed Best Effort',SS:'Same Sex',OPEN:'Open Format'
    }[activeRound.format] || activeRound.format;

    const totalRounds = rounds?.length || 1;

    // Fetch pairings + scores
    const { data: pairings } = await sb.from('pairings')
      .select('*').eq('round_id', activeRound.id)
      .order('court_number');

    // Now we have pairings.length — update round label
    document.getElementById('round-label').textContent =
      `Round ${activeRound.round_number} of ${totalRounds}  ·  ${fmtLabel}  ·  ${pairings?.length||0} Courts`;

    let scores = [];
    if(pairings?.length) {
      const pairingIds = pairings.map(p=>p.id);
      const { data: scData, error: scErr } = await sb.from('scores').select('*').in('pairing_id', pairingIds);
      if(scErr) console.error('Score fetch error:', scErr);
      scores = scData || [];
      console.log('Current round scores:', scores.length, 'for', pairingIds.length, 'pairings');
    }

    // Fetch player names
    const allPids = [...new Set(
      (pairings||[]).flatMap(p=>[
        p.team_a_player1_id, p.team_a_player2_id,
        p.team_b_player1_id, p.team_b_player2_id
      ]).filter(Boolean)
    )];
    const nc = {};
    if(allPids.length) {
      const { data: players } = await sb.from('players')
        .select('id,roster_name').in('id', allPids);
      (players||[]).forEach(p => nc[p.id] = p.roster_name);
    }

    // Fetch sitouts
    const { data: eps } = await sb.from('event_players')
      .select('id,players(roster_name)').eq('event_id', activeEventId);
    const epIds = (eps||[]).map(e=>e.id);
    const { data: sitouts } = epIds.length
      ? await sb.from('sitout_log').select('event_player_id')
          .eq('round_number', activeRound.round_number)
          .in('event_player_id', epIds)
      : { data: [] };

    // ── ALL ROUNDS SCORES (cumulative totals) ────────────
    const { data: allRoundRows } = await sb.from('rounds')
      .select('id').eq('event_id', activeEventId);
    const allRoundIds = (allRoundRows||[]).map(r=>r.id);
    const { data: allPairings } = allRoundIds.length
      ? await sb.from('pairings').select('id,team_a_id,team_b_id').in('round_id', allRoundIds)
      : { data: [] };
    const { data: allScores } = allPairings?.length
      ? await sb.from('scores').select('pairing_id,team_a_games,team_b_games')
          .in('pairing_id', allPairings.map(p=>p.id))
      : { data: [] };

    // ── RENDER ───────────────────────────────────────────
    // Merge current round scores with allScores — current round takes priority
    const allScoreIds = new Set((allScores||[]).map(s=>s.pairing_id));
    const mergedScores = [
      ...(scores||[]),
      ...(allScores||[]).filter(s=>!(scores||[]).find(cs=>cs.pairing_id===s.pairing_id))
    ];
    console.log('Merged scores:', mergedScores.length, '(current:', (scores||[]).length, '+ additional from allScores:', mergedScores.length-(scores||[]).length, ')');
    renderScoreboard(teams, pairings||[], mergedScores, nc, sitouts||[], eps||[], allPairings||[], allScores||[]);
  }

  function shortName(id, nc) {
    const full = nc[id] || '?';
    const parts = full.split(' ');
    if(parts.length < 2) return full;
    return parts[0] + ' ' + parts[parts.length-1][0] + '.';
  }

  function renderScoreboard(teams, pairings, scores, nc, sitouts, eps, allPairings, allScores) {
    const sorted = [...pairings].sort((a,b) => a.court_number - b.court_number);

    // Determine team A and B from first pairing
    const teamAId = sorted[0]?.team_a_id || teams[0]?.id;
    const teamBId = sorted[0]?.team_b_id || teams[1]?.id;
    const teamA = teams.find(t=>t.id===teamAId) || teams[0];
    const teamB = teams.find(t=>t.id===teamBId) || teams[1];
    const colorA = teamA?.color || '#E53E3E';
    const colorB = teamB?.color || '#3182CE';

    // Calculate CUMULATIVE totals across ALL rounds
    // OPEN format uses director bonus points; all others use games won
    let totalA = 0, totalB = 0;
    (allScores||[]).forEach(sc => {
      const p = (allPairings||[]).find(x=>x.id===sc.pairing_id);
      if(!p) return;
      // Check if this pairing's round is OPEN format
      const isOpenPairing = sc.team_a_bonus!=null || sc.team_b_bonus!=null;
      if(isOpenPairing && (sc.team_a_bonus||0)+(sc.team_b_bonus||0)>0){
        // OPEN: use director bonus points
        if(p.team_a_id===teamAId){ totalA+=sc.team_a_bonus||0; totalB+=sc.team_b_bonus||0; }
        else { totalA+=sc.team_b_bonus||0; totalB+=sc.team_a_bonus||0; }
      } else {
        // All other formats: use games won
        if(p.team_a_id===teamAId){ totalA+=sc.team_a_games||0; totalB+=sc.team_b_games||0; }
        else { totalA+=sc.team_b_games||0; totalB+=sc.team_a_games||0; }
      }
    });
    console.log('Cumulative totals: A=', totalA, 'B=', totalB, 'from', allScores?.length, 'scores');

    // Update score bar
    document.getElementById('team-a-name').textContent = teamA?.name || 'Team A';
    document.getElementById('team-a-name').style.color = colorA;
    document.getElementById('team-a-score').textContent = totalA;
    document.getElementById('team-a-score').style.color = totalA >= totalB ? colorA : 'rgba(255,255,255,.4)';
    document.getElementById('team-a-block').style.background = colorA + '12';

    document.getElementById('team-b-name').textContent = teamB?.name || 'Team B';
    document.getElementById('team-b-name').style.color = colorB;
    document.getElementById('team-b-score').textContent = totalB;
    document.getElementById('team-b-score').style.color = totalB >= totalA ? colorB : 'rgba(255,255,255,.4)';
    document.getElementById('team-b-block').style.background = colorB + '12';

    // Render courts
    const container = document.getElementById('courts-container');
    if(!sorted.length) {
      showEmpty('No courts yet');
      return;
    }

    // Dynamic sizing based on number of courts
    const courtCount = sorted.length;
    const sizing = {
      playerFont: courtCount <= 2 ? 'clamp(18px,2.8vw,36px)' :
                  courtCount <= 3 ? 'clamp(16px,2.2vw,30px)' :
                  courtCount <= 4 ? 'clamp(14px,1.8vw,26px)' :
                  courtCount <= 5 ? 'clamp(12px,1.5vw,22px)' :
                                    'clamp(11px,1.3vw,18px)',
      scoreFont:  courtCount <= 2 ? 'clamp(36px,6vw,88px)' :
                  courtCount <= 3 ? 'clamp(30px,5vw,72px)' :
                  courtCount <= 4 ? 'clamp(26px,4.2vw,64px)' :
                  courtCount <= 5 ? 'clamp(22px,3.5vw,54px)' :
                                    'clamp(18px,3vw,46px)',
      padding:    courtCount <= 2 ? '0 32px' :
                  courtCount <= 4 ? '0 24px' :
                                    '0 16px',
      courtLabel: courtCount <= 2 ? '14px' :
                  courtCount <= 4 ? '12px' : '10px',
    };

    container.innerHTML = sorted.map((p, i) => {
      // Check current round scores first, then fall back to allScores
      const sc = scores.find(s=>s.pairing_id===p.id) || allScores.find(s=>s.pairing_id===p.id);
      const aIsTeamA = p.team_a_id === teamAId;

      const leftP1 = aIsTeamA ? p.team_a_player1_id : p.team_b_player1_id;
      const leftP2 = aIsTeamA ? p.team_a_player2_id : p.team_b_player2_id;
      const rightP1 = aIsTeamA ? p.team_b_player1_id : p.team_a_player1_id;
      const rightP2 = aIsTeamA ? p.team_b_player2_id : p.team_a_player2_id;

      let leftGames = null, rightGames = null;
      if(sc) {
        leftGames = aIsTeamA ? sc.team_a_games : sc.team_b_games;
        rightGames = aIsTeamA ? sc.team_b_games : sc.team_a_games;
      }

      const leftWon = leftGames !== null && rightGames !== null && leftGames > rightGames;
      const rightWon = rightGames !== null && leftGames !== null && rightGames > leftGames;
      const isPlaying = leftGames === null;
      const isDone = !isPlaying;

      // Dim the whole row slightly when done
      const rowOpacity = isDone ? '.85' : '1';

      // Score display — big in center when done, subtle dot when playing
      const scoreDisplay = isPlaying
        ? `<div style="display:flex;flex-direction:column;align-items:center;gap:4px;width:100%">
            <div style="font-size:${sizing.courtLabel};color:rgba(255,255,255,.25);font-family:var(--font-body);font-weight:700;text-transform:uppercase;letter-spacing:.5px">C${p.court_number}</div>
            <div style="font-size:10px;color:rgba(255,255,255,.2);font-family:var(--font-body);font-weight:600;text-transform:uppercase;letter-spacing:.5px">playing</div>
           </div>`
        : `<div style="display:flex;flex-direction:column;align-items:center;gap:4px;width:100%">
            <div style="font-size:${sizing.courtLabel};color:rgba(255,255,255,.2);font-family:var(--font-body);font-weight:700;text-transform:uppercase;letter-spacing:.5px">C${p.court_number}</div>
            <div style="display:flex;align-items:center;justify-content:center;gap:8px;font-family:var(--font-display);font-style:italic;width:100%">
              <span style="font-size:${sizing.scoreFont};font-weight:900;line-height:1;color:${leftWon?colorA:'rgba(255,255,255,.35)'}">${leftGames}</span>
              <span style="font-size:${sizing.courtLabel};color:rgba(255,255,255,.2);flex-shrink:0">–</span>
              <span style="font-size:${sizing.scoreFont};font-weight:900;line-height:1;color:${rightWon?colorB:'rgba(255,255,255,.35)'}">${rightGames}</span>
            </div>
           </div>`;

      return `
      <div class="court-grid" style="border-left:4px solid ${colorA};border-right:4px solid ${colorB};opacity:${rowOpacity}">
        <!-- Team A side -->
        <div class="court-team team-a" style="padding:${sizing.padding}">
          <div class="court-players" style="text-align:right">
            <div class="player-name ${isDone&&!leftWon?'dim':''}" style="font-size:${sizing.playerFont}">${shortName(leftP1, nc)}</div>
            <div class="player-name ${isDone&&!leftWon?'dim':''}" style="font-size:${sizing.playerFont}">${shortName(leftP2, nc)}</div>
          </div>
        </div>

        <!-- Score center -->
        <div class="court-center">${scoreDisplay}</div>

        <!-- Team B side -->
        <div class="court-team team-b" style="padding:${sizing.padding}">
          <div class="court-players">
            <div class="player-name ${isDone&&!rightWon?'dim':''}" style="font-size:${sizing.playerFont}">${shortName(rightP1, nc)}</div>
            <div class="player-name ${isDone&&!rightWon?'dim':''}" style="font-size:${sizing.playerFont}">${shortName(rightP2, nc)}</div>
          </div>
        </div>
      </div>`;
    }).join('');

    // Sitting out
    const soNames = sitouts.map(s => {
      const ep = eps.find(e=>e.id===s.event_player_id);
      return ep?.players?.roster_name || '?';
    }).filter(Boolean);

    const soBar = document.getElementById('sitout-bar');
    if(soNames.length) {
      soBar.style.display = 'block';
      document.getElementById('sitout-names').textContent = soNames.join(', ');
    } else {
      soBar.style.display = 'none';
    }

    // Update refresh time
    const now = new Date();
    let rh = now.getHours();
    const ram = rh >= 12 ? 'PM' : 'AM';
    rh = rh % 12 || 12;
    const rm = now.getMinutes().toString().padStart(2,'0');
    document.getElementById('refresh-text').textContent =
      `Updated ${rh}:${rm} ${ram} · tap to refresh`;
  }

  function showEmpty(msg) {
    document.getElementById('courts-container').innerHTML =
      `<div id="loading"><div class="empty-msg">${msg}</div></div>`;
  }

  // ── START ────────────────────────────────────────────
  init();
</script>
</body>
</html>
